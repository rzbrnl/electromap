<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>ElectroMap — Buscador de cargadores eléctricos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Google+Sans+Code:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="css/style.css?v=em22" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2322c55e'><path d='M7 2v11h3v9l7-12h-4l4-8z'/></svg>"
    />
  </head>
  <body>
    <svg style="display: none">
      <symbol
        id="icon-charger"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
      </symbol>
      <symbol
        id="icon-bolt"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
      </symbol>
      <symbol
        id="icon-battery"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect>
        <line x1="23" y1="13" x2="23" y2="11"></line>
        <line x1="6" y1="10" x2="6" y2="14"></line>
        <line x1="10" y1="10" x2="10" y2="14"></line>
        <line x1="14" y1="10" x2="14" y2="14"></line>
      </symbol>
      <symbol
        id="icon-search"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M17 17L21 21"></path>
        <path
          d="M19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19C15.4183 19 19 15.4183 19 11Z"
        ></path>
      </symbol>
      <symbol
        id="icon-filter"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path d="M3 7H6" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M3 17H9" stroke-linecap="round" stroke-linejoin="round"></path>
        <path
          d="M18 17L21 17"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></path>
        <path
          d="M15 7L21 7"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></path>
        <path
          d="M6 7C6 6.06812 6 5.60218 6.15224 5.23463C6.35523 4.74458 6.74458 4.35523 7.23463 4.15224C7.60218 4 8.06812 4 9 4C9.93188 4 10.3978 4 10.7654 4.15224C11.2554 4.35523 11.6448 4.74458 11.8478 5.23463C12 5.60218 12 6.06812 12 7C12 7.93188 12 8.39782 11.8478 8.76537C11.6448 9.25542 11.2554 9.64477 10.7654 9.84776C10.3978 10 9.93188 10 9 10C8.06812 10 7.60218 10 7.23463 9.84776C6.74458 9.64477 6.35523 9.25542 6.15224 8.76537C6 8.39782 6 7.93188 6 7Z"
        ></path>
        <path
          d="M12 17C12 16.0681 12 15.6022 12.1522 15.2346C12.3552 14.7446 12.7446 14.3552 13.2346 14.1522C13.6022 14 14.0681 14 15 14C15.9319 14 16.3978 14 16.7654 14.1522C17.2554 14.3552 17.6448 14.7446 17.8478 15.2346C18 15.6022 18 16.0681 18 17C18 17.9319 18 18.3978 17.8478 18.7654C17.6448 19.2554 17.2554 19.6448 16.7654 19.8478C16.3978 20 15.9319 20 15 20C14.0681 20 13.6022 20 13.2346 19.8478C12.7446 19.6448 12.3552 19.2554 12.1522 18.7654C12 18.3978 12 17.9319 12 17Z"
        ></path>
      </symbol>
      <symbol
        id="icon-settings"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <circle cx="12" cy="12" r="3"></circle>
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
        ></path>
      </symbol>
      <symbol
        id="icon-close"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </symbol>
      <symbol
        id="icon-location"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
      </symbol>
      <symbol
        id="icon-sun"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </symbol>
      <symbol
        id="icon-moon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </symbol>
      <symbol
        id="icon-info"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </symbol>
      <symbol
        id="icon-live"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="2"></circle>
        <path d="M16.24 7.76a6 6 0 0 1 0 8.49"></path>
        <path d="M7.76 16.24a6 6 0 0 1 0-8.49"></path>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        <path d="M4.93 19.07a10 10 0 0 1 0-14.14"></path>
      </symbol>
      <symbol
        id="icon-plug"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M12 22v-5"></path>
        <path d="M9 8V2"></path>
        <path d="M15 8V2"></path>
        <path d="M18 8v4a2 2 0 0 1-2 2h-8a2 2 0 0 1-2-2V8h12z"></path>
      </symbol>
      <symbol
        id="icon-power"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
        <line x1="12" y1="2" x2="12" y2="12"></line>
      </symbol>
      <symbol
        id="icon-navigation"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
      </symbol>
    </svg>

    <header id="topbar">
      <div class="logo">
        <span>ElectroMap</span>
      </div>
      <div class="top-actions">
        <button class="top-btn" id="btn-legend" title="Leyenda de colores">
          <svg class="icon" width="18" height="18"><use href="#icon-charger"></use></svg>
        </button>
        <button class="top-btn" id="btn-filters" title="Filtros">
          <svg class="icon" width="18" height="18"><use href="#icon-filter"></use></svg>
        </button>
        <button class="top-btn" id="btn-location" title="Mi ubicación">
          <svg class="icon" width="18" height="18"><use href="#icon-location"></use></svg>
        </button>
        <button class="top-btn" id="btn-theme" title="Cambiar tema">
          <svg class="icon icon-sun" width="18" height="18"><use href="#icon-sun"></use></svg>
          <svg class="icon icon-moon" width="18" height="18" style="display: none"><use href="#icon-moon"></use></svg>
        </button>
      </div>
    </header>

    <div id="map"></div>

    <aside id="sidebar" class="hidden">
      <div class="sidebar-header">
        <span
          style="font-size: 13px; color: var(--text-muted)"
          id="sidebar-title"
          >Detalles del cargador</span
        >
        <button id="close-sidebar" class="close-btn">
          <svg class="icon" width="14" height="14">
            <use href="#icon-close"></use>
          </svg>
        </button>
      </div>

      <div id="charger-details" class="charger-card">
        <div class="charger-header">
          <svg class="icon charger-icon" width="32" height="32">
            <use href="#icon-charger"></use>
          </svg>
          <div class="charger-title" id="charger-name">---</div>
          <div class="charger-operator" id="charger-operator">---</div>
        </div>

        <div class="charger-address" id="charger-address">---</div>

        <div class="status-badge" id="charger-status">
          <span class="status-dot"></span>
          <span id="status-text">---</span>
        </div>

        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label"><svg class="icon" width="12" height="12"><use href="#icon-plug"></use></svg> Conectores</div>
            <div class="stat-value" id="charger-connectors">---</div>
          </div>
          <div class="stat-item">
            <div class="stat-label"><svg class="icon" width="12" height="12"><use href="#icon-power"></use></svg> Potencia</div>
            <div class="stat-value" id="charger-power">---</div>
          </div>
          <div class="stat-item">
            <div class="stat-label"><svg class="icon" width="12" height="12"><use href="#icon-battery"></use></svg> Nivel</div>
            <div class="stat-value" id="charger-level">---</div>
          </div>
          <div class="stat-item">
            <div class="stat-label"><svg class="icon" width="12" height="12"><use href="#icon-location"></use></svg> Distancia</div>
            <div class="stat-value" id="charger-distance">---</div>
            <div class="stat-sub" id="charger-duration" style="display: none; font-size: 11px; color: var(--text-muted); margin-top: 2px;"></div>
          </div>
          <div class="stat-item">
            <div class="stat-label"><svg class="icon" width="12" height="12"><use href="#icon-charger"></use></svg> Puntos</div>
            <div class="stat-value" id="charger-points">---</div>
          </div>
          <div class="stat-item">
            <div class="stat-label"><svg class="icon" width="12" height="12"><use href="#icon-power"></use></svg> Costo</div>
            <div class="stat-value" id="charger-cost">---</div>
          </div>
        </div>

        <div id="charger-photos" class="charger-photos" style="display: none">
          <div class="photos-title">Fotos</div>
          <div class="photos-grid" id="photos-grid"></div>
        </div>

        <div id="charger-extra" style="display: none">
          <div
            style="
              font-size: 12px;
              color: var(--text-muted);
              margin: 16px 0 8px;
              text-transform: uppercase;
              letter-spacing: 0.05em;
            "
          >
            Información adicional
          </div>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-label">Uso</div>
              <div class="stat-value" id="charger-usage">---</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Operador</div>
              <div class="stat-value" id="charger-network">---</div>
            </div>
          </div>
          <div id="charger-connections-list" style="margin-top: 12px"></div>
        </div>

        <button class="more-info-btn" id="btn-more-info">
          <svg class="icon" width="14" height="14">
            <use href="#icon-info"></use>
          </svg>
          Más información
        </button>

        <button class="navigate-btn" id="btn-navigate">
          <svg class="icon" width="16" height="16"><use href="#icon-navigation"></use></svg>
          Cómo llegar
        </button>
        <button class="share-btn" id="btn-share">
          <svg class="icon" width="16" height="16"><use href="#icon-location"></use></svg>
          Compartir ubicación
        </button>
      </div>
    </aside>

    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-spinner-large"></div>
      <div class="loading-text">Buscando cargadores...</div>
    </div>

    <div id="color-legend" class="color-legend hidden">
      <div class="legend-title">Tipos de carga</div>
      <div class="legend-item"><span class="legend-dot fast"></span> DC Rápida</div>
      <div class="legend-item"><span class="legend-dot level2"></span> Nivel 2</div>
      <div class="legend-item"><span class="legend-dot level1"></span> Nivel 1</div>
    </div>

    <footer id="bottombar">
      <div class="bottom-stat">
        <svg class="icon" width="14" height="14">
          <use href="#icon-charger"></use>
        </svg>
        <span class="value" id="charger-count">0</span>
        <span>cargadores</span>
      </div>
      <div class="bottom-stat">
        <svg class="icon" width="14" height="14">
          <use href="#icon-power"></use>
        </svg>
        <span class="value" id="active-count">0</span>
        <span>activos</span>
      </div>
      <div class="bottom-stat live" id="status-indicator">
        <svg class="icon live-icon" width="14" height="14">
          <use href="#icon-live"></use>
        </svg>
        <span class="value" id="data-source">En vivo</span>
      </div>
      <div class="bottom-stat" style="margin-left: 20px; opacity: 0.5">
        <span style="font-size: 10px">v1.2</span>
      </div>
    </footer>

    <div id="filters-panel" class="hidden">
      <div class="filters-header">
        <span>Filtros</span>
        <button id="close-filters" class="close-btn">
          <svg class="icon" width="14" height="14">
            <use href="#icon-close"></use>
          </svg>
        </button>
      </div>
      <div class="filters-body">
        <div class="filter-group">
          <label class="filter-label">Tipo de Conector</label>
          <div class="filter-options" id="filter-connectors">
            <label class="filter-option">
              <input type="checkbox" value="CCS" checked /> CCS (Combo)
            </label>
            <label class="filter-option">
              <input type="checkbox" value="CHAdeMO" checked /> CHAdeMO
            </label>
            <label class="filter-option">
              <input type="checkbox" value="Type2" checked /> Type 2 (Mennekes)
            </label>
            <label class="filter-option">
              <input type="checkbox" value="Tesla" checked /> Tesla
            </label>
            <label class="filter-option">
              <input type="checkbox" value="Type1" checked /> Type 1 (J1772)
            </label>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Nivel de Carga</label>
          <div class="filter-options" id="filter-levels">
            <label class="filter-option">
              <input type="checkbox" value="3" checked /> DC Rápida (Level 3)
            </label>
            <label class="filter-option">
              <input type="checkbox" value="2" checked /> Nivel 2 (AC)
            </label>
            <label class="filter-option">
              <input type="checkbox" value="1" checked /> Nivel 1
            </label>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Estado</label>
          <div class="filter-options" id="filter-status">
            <label class="filter-option">
              <input type="checkbox" value="operational" checked /> Operativo
            </label>
            <label class="filter-option">
              <input type="checkbox" value="non-operational" checked /> No
              operativo
            </label>
            <label class="filter-option">
              <input type="checkbox" value="unknown" checked /> Desconocido
            </label>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Unidad de Distancia</label>
          <div class="unit-toggle">
            <button class="unit-btn active" id="btn-unit-km" data-unit="km">km</button>
            <button class="unit-btn" id="btn-unit-mi" data-unit="mi">mi</button>
          </div>
        </div>
        <button class="apply-filters-btn" id="btn-apply-filters">
          Aplicar Filtros
        </button>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="assets/data.js?v=em21"></script>
    <script src="assets/map.js?v=em21"></script>
    <script src="assets/main.js?v=em21"></script>
  </body>
</html>
